<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Bill Storefront - Premium Asset Collections</title>
    <style>
        /* --- MODERN RESET & CORE THEME VARIABLES --- */
        :root {
            --bg-primary: #0a0505;
            --bg-card: #140b0b;
            --accent-neon: #ff1e27;
            --accent-glow: rgba(255, 30, 39, 0.15);
            --text-main: #f5f5f5;
            --text-muted: #a39797;
            --border-color: #261213;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, transparent 20%, var(--bg-primary) 80%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* --- STUNNING CYBERPUNK GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .theme-section {
            margin-bottom: 2.5rem;
        }

        .theme-section details {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: rgba(20, 11, 11, 0.9);
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.25);
        }

        .theme-section summary {
            list-style: none;
            cursor: pointer;
            padding: 1.15rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid transparent;
        }

        .theme-section summary::-webkit-details-marker {
            display: none;
        }

        .theme-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .theme-meta {
            color: var(--text-muted);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .theme-content {
            padding: 1.25rem;
        }

        .theme-preview-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .theme-preview-thumb {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            min-height: 120px;
        }

        .theme-preview-thumb img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .theme-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .theme-card-grid .card {
            min-height: 100%;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .thumbnail-wrapper {
            width: 100%;
            height: 220px;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .thumbnail {
            transform: scale(1.05);
        }

        .card-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-details h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .price {
            font-size: 1.4rem;
            color: var(--accent-neon);
            font-weight: 700;
            margin-top: 15px;
        }

        .price span {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- THE CYBERPUNK BUY BUTTON --- */
        .buy-now-btn {
            width: 100%;
            background: linear-gradient(135deg, #cc1117 0%, var(--accent-neon) 100%);
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 6px;
            padding: 14px 24px;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(255, 30, 39, 0.3);
        }

        .buy-now-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, var(--accent-neon) 0%, #ff4f55 100%);
            box-shadow: 0 6px 20px rgba(255, 30, 39, 0.5);
        }

        .footer-nav {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--accent-neon);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>Wild Bill Storefront Vault</h1>
            <p>Premium theme-specific graphic artwork design bundles and structural master packages.</p>
        </div>

        <div id="product-grid" class="product-grid">
            <div class="empty-state">Loading catalog...</div>
        </div>

        <footer class="footer-nav">
            <p>&copy; 2026 Wild Bill Pro Plans. All Rights Reserved.</p>
            <div class="footer-links">
                <a href="/pricing.html">Pricing Tiers</a>
                <a href="/terms.html">Terms of Service</a>
                <a href="/privacy.html">Privacy Policy</a>
                <a href="/refund.html">Refund Policy</a>
                <a href="/contact">Contact Support</a>
            </div>
        </footer>
    </div>

    <script>
        const grid = document.getElementById('product-grid');

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function deriveTheme(product) {
            const title = String(product.Title || '').trim();
            const description = String(product.Description || '').trim();
            const themeFromDescription = description.match(/theme[d]?\s+([^\.]+)/i);
            if (themeFromDescription && themeFromDescription[1]) {
                return themeFromDescription[1].trim();
            }

            const separators = [' Vol', ' vol', ' Collection', ' collection'];
            for (const separator of separators) {
                const index = title.indexOf(separator);
                if (index > 0) {
                    return title.slice(0, index).trim();
                }
            }

            return title.split(' ').slice(0, 4).join(' ').trim() || 'Other';
        }

        function renderCard(product) {
            const previewUrl = product.Preview_URL || '';
            const title = product.Title || 'Untitled Bundle';
            const description = product.Description || 'Premium digital asset pack collection.';
            const price = product.Price || '15.00';
            const previewHref = previewUrl || '/contact';

            return `
                <div class="card">
                    <div class="thumbnail-wrapper">
                        <img src="${escapeHtml(previewUrl)}" alt="${escapeHtml(title)}" class="thumbnail" onerror="this.style.display='none'">
                    </div>
                    <div class="card-details">
                        <div>
                            <h3>${escapeHtml(title)}</h3>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin: 5px 0 0 0;">${escapeHtml(description)}</p>
                        </div>
                        <div>
                            <div class="price">$${escapeHtml(price)} <span>USD</span></div>
                            <button class="buy-now-btn" onclick="window.location.href='${escapeHtml(previewHref)}'">Open Preview</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderThemeSection(themeName, items) {
            const previewItems = items.slice(0, 4).map((product) => `
                <div class="theme-preview-thumb">
                    <img src="${escapeHtml(product.Preview_URL || '')}" alt="${escapeHtml(product.Title || themeName)} preview" onerror="this.style.display='none'">
                </div>
            `).join('');

            return `
                <section class="theme-section">
                    <details open>
                        <summary>
                            <span class="theme-title">${escapeHtml(themeName)}</span>
                            <span class="theme-meta">${items.length} bundle${items.length === 1 ? '' : 's'}</span>
                        </summary>
                        <div class="theme-content">
                            <div class="theme-preview-strip">
                                ${previewItems}
                            </div>
                            <div class="theme-card-grid">
                                ${items.map(renderCard).join('')}
                            </div>
                        </div>
                    </details>
                </section>
            `;
        }

        fetch('/products.json')
            .then((response) => response.json())
            .then((products) => {
                if (!Array.isArray(products) || products.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No products found.</div>';
                    return;
                }

                const grouped = products.reduce((accumulator, product) => {
                    const themeName = deriveTheme(product);
                    if (!accumulator[themeName]) {
                        accumulator[themeName] = [];
                    }
                    accumulator[themeName].push(product);
                    return accumulator;
                }, {});

                const orderedThemes = Object.keys(grouped).sort((left, right) => {
                    return grouped[right].length - grouped[left].length || left.localeCompare(right);
                });

                grid.innerHTML = orderedThemes.map((themeName) => renderThemeSection(themeName, grouped[themeName])).join('');
            })
            .catch(() => {
                grid.innerHTML = '<div class="empty-state">Catalog unavailable right now.</div>';
            });
    </script>
</body>
</html>
