<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Bill Vault - Premium Assets</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #141b2d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #00eaff;
            --accent-hover: #00b8cc;
            --border-color: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card h3 { font-size: 1.15rem; margin-bottom: 0.5rem; }
        .price { color: var(--accent); font-weight: bold; font-size: 1.4rem; margin: 0.5rem 0; }
        .btn {
            display: block;
            text-align: center;
            background-color: var(--accent);
            color: #000;
            padding: 0.6rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .btn:hover { background-color: var(--accent-hover); }
    </style>
    <!-- Paddle Setup integration -->
    <script src="https://paddle.com"></script>
    <script type="text/javascript">
      Paddle.Setup({ token: 'live_token_here' }); // <-- Paste your Client-side Token here
    </script>
</head>
<body>
    <div class="container">
        <h1>Storefront Asset Gallery</h1>
        
        <div class="grid">
            {% for product in products %}
            <div class="card">
                <div>
                    <!-- Safe format substitution bypasses missing descriptions -->
                    <h3>{{ product['name'].replace('_', ' ').title() }}</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">SKU: {{ product['sku'] }}</p>
                    <div class="price">${{ product['price'] }} <span>USD</span></div>
                </div>
                <!-- Launches Paddle overlay directly using database keys -->
                <button class="btn" onclick="openCheckout('{{ product['paddle_price_id'] }}')">
                    Purchase Package
                </button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script type="text/javascript">
    function openCheckout(priceId) {
        if (!priceId || priceId === 'None' || priceId === '') {
            alert('Checkout key error. Please sync database records.');
            return;
        }
        Paddle.Checkout.open({
            items: [{ priceId: priceId, quantity: 1 }]
        });
    }
    </script>
</body>
</html>
